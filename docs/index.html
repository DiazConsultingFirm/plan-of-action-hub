    <script>
      // Anti-flash: apply the saved theme before first paint, same pattern as
      // the Command Center — otherwise there's a flash of dark before the
      // React app mounts and reads localStorage itself.
      (function () {
        try {
          var saved = localStorage.getItem('poaTheme');
          if (saved === 'dark' || saved === 'light') {
            document.documentElement.setAttribute('data-theme', saved);
          }
        } catch (e) {}
      })();
    </script>
